<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>te amo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --magenta-deep: #6b0a34;
    --magenta-mid: #a3134f;
    --magenta-hot: #e0176e;
    --card-bg: #ffe9f0;
    --box-red: #e8384f;
    --box-red-dark: #c92a3f;
    --ribbon-pink: #ff9fc0;
    --bear-tan: #caa06a;
    --bear-tan-dark: #b3894f;
    --text-dark: #7a1030;
    --gold: #ffcf6b;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0; min-height:100%;
    font-family:'Quicksand', sans-serif;
    background: radial-gradient(circle at 20% 10%, var(--magenta-hot), var(--magenta-mid) 45%, var(--magenta-deep) 100%);
    overflow-x:hidden;
  }

  #hearts-bg{
    position:fixed; inset:0; z-index:0; overflow:hidden;
  }

  .bg-heart{
    position:absolute;
    color: rgba(255,255,255,.08);
    animation: floatUp linear infinite;
  }

  @keyframes floatUp{
    from{ transform: translateY(10vh) rotate(0deg); }
    to{ transform: translateY(-120vh) rotate(25deg); }
  }

  main{
    position:relative;
    z-index:2;
    min-height:100vh;
    min-height: 100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 32px 16px;
  }

  .card{
    background: var(--card-bg);
    border-radius: 34px;
    max-width: 420px;
    width:100%;
    padding: 38px 26px 34px;
    text-align:center;
    box-shadow: 0 30px 70px rgba(0,0,0,.35);
    position:relative;
    overflow:hidden;
  }

  .card::before{
    content:'';
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 90% 8%, rgba(255,159,192,.35) 0%, transparent 35%),
      radial-gradient(circle at 6% 92%, rgba(255,159,192,.3) 0%, transparent 35%);
    pointer-events:none;
  }

  .eyebrow{
    font-family:'Baloo 2', sans-serif;
    color: var(--magenta-hot);
    letter-spacing: .06em;
    font-size: 13px;
    margin: 0 0 6px;
    position:relative;
  }

  h1.title{
    font-family:'Baloo 2', sans-serif;
    color: var(--text-dark);
    font-size: clamp(1.5rem, 6vw, 1.9rem);
    margin: 0 0 6px;
    position:relative;
  }

  .hint{
    color: rgba(122,16,48,.55);
    font-size: 13px;
    margin: 0 0 26px;
    position:relative;
  }

  /* ---------- escena de la caja ---------- */

  #scene{
    position:relative;
    height: 230px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    margin-bottom: 6px;
  }

  .gift-wrap{
    position:relative;
    width: 170px;
    height: 200px;
    cursor:pointer;
    animation: bob 2.6s ease-in-out infinite;
  }

  @keyframes bob{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-6px); }
  }

  #scene.opened .gift-wrap{ animation: none; cursor: default; }

  .tap-hint{
    position:absolute;
    bottom: -2px; left:50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--magenta-hot);
    font-family:'Baloo 2', sans-serif;
    animation: hintPulse 1.6s ease-in-out infinite;
    white-space:nowrap;
  }

  @keyframes hintPulse{
    0%,100%{ opacity:.55; }
    50%{ opacity:1; }
  }

  #scene.opened .tap-hint{ display:none; }

  .box-body{
    position:absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 100px;
    background:
      linear-gradient(90deg, transparent 44%, var(--ribbon-pink) 44%, var(--ribbon-pink) 56%, transparent 56%),
      radial-gradient(circle at 20% 30%, rgba(255,255,255,.35) 0 6px, transparent 7px),
      radial-gradient(circle at 75% 65%, rgba(255,255,255,.35) 0 6px, transparent 7px),
      radial-gradient(circle at 30% 78%, rgba(255,255,255,.35) 0 6px, transparent 7px),
      var(--box-red);
    border-radius: 8px;
    z-index: 3;
    box-shadow: 0 14px 26px rgba(0,0,0,.28);
  }

  .lid{
    position:absolute;
    bottom: 96px; left:50%;
    transform: translateX(-50%);
    width: 166px;
    height: 34px;
    background:
      linear-gradient(90deg, transparent 44%, var(--ribbon-pink) 44%, var(--ribbon-pink) 56%, transparent 56%),
      var(--box-red-dark);
    border-radius: 8px;
    z-index: 4;
    box-shadow: 0 10px 18px rgba(0,0,0,.25);
    transition: transform .7s cubic-bezier(.2,.9,.25,1), opacity .6s ease .1s;
    transform-origin: 50% 100%;
  }

  .bow{
    position:absolute;
    bottom: 128px; left:50%;
    transform: translateX(-50%);
    width: 70px; height: 40px;
    z-index: 5;
    transition: transform .6s ease, opacity .5s ease;
  }

  .bow::before, .bow::after{
    content:'';
    position:absolute;
    width: 30px; height: 30px;
    background: var(--ribbon-pink);
    border-radius: 50% 50% 50% 4%;
    top: 4px;
  }

  .bow::before{ left: 2px; transform: rotate(-25deg); }
  .bow::after{ right: 2px; transform: rotate(25deg) scaleX(-1); }

  .bow-knot{
    position:absolute;
    bottom: 122px; left:50%;
    transform: translateX(-50%);
    width: 16px; height:16px;
    background: var(--gold);
    border-radius: 50%;
    z-index: 6;
    box-shadow: 0 0 0 3px rgba(255,255,255,.15);
  }

  #scene.opened .lid{
    transform: translateX(-50%) translateY(-120px) rotate(-24deg);
    opacity: 0;
  }
  #scene.opened .bow{
    transform: translateX(-50%) translateY(-150px) rotate(-30deg);
    opacity: 0;
  }
  #scene.opened .bow-knot{
    opacity:0;
    transition: opacity .4s ease;
  }

  /* brillo al abrir */
  .burst{
    position:absolute;
    bottom: 96px; left:50%;
    transform: translateX(-50%) scale(0);
    width: 140px; height:140px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,255,255,.9), rgba(255,207,107,.4) 40%, transparent 70%);
    z-index: 2;
    opacity:0;
  }
  #scene.opened .burst{
    animation: burstOut .7s ease-out forwards;
  }
  @keyframes burstOut{
    0%{ opacity:1; transform: translateX(-50%) scale(.2); }
    100%{ opacity:0; transform: translateX(-50%) scale(2.4); }
  }

  /* ---------- oso ---------- */

  .bear{
    position:absolute;
    bottom: 60px; left:50%;
    width: 110px; height:110px;
    transform: translateX(-50%) translateY(30px) scale(.5);
    opacity:0;
    z-index: 4;
    transition: transform .8s cubic-bezier(.2,.85,.3,1.2) .35s, opacity .5s ease .35s;
  }

  #scene.opened .bear{
    transform: translateX(-50%) translateY(-8px) scale(1);
    opacity:1;
    animation: bearSway 2.4s ease-in-out 1.2s infinite;
  }

  @keyframes bearSway{
    0%,100%{ transform: translateX(-50%) translateY(-8px) rotate(-2deg); }
    50%{ transform: translateX(-50%) translateY(-12px) rotate(2deg); }
  }

  .bear .ear{
    position:absolute;
    width: 30px; height:30px;
    background: var(--bear-tan-dark);
    border-radius:50%;
    top: -6px;
  }
  .bear .ear.l{ left: 2px; }
  .bear .ear.r{ right: 2px; }
  .bear .ear::after{
    content:'';
    position:absolute;
    width:14px; height:14px;
    background: #e8c99a;
    border-radius:50%;
    top:8px; left:8px;
  }

  .bear .head{
    position:absolute;
    top: 6px; left:50%;
    transform: translateX(-50%);
    width: 92px; height: 86px;
    background: var(--bear-tan);
    border-radius: 50% 50% 46% 46%/ 55% 55% 45% 45%;
  }

  .bear .snout{
    position:absolute;
    bottom: 14px; left:50%;
    transform: translateX(-50%);
    width: 48px; height: 34px;
    background: #f0dcb8;
    border-radius: 50%;
  }

  .bear .nose{
    position:absolute;
    top: -6px; left:50%;
    transform: translateX(-50%);
    width: 12px; height: 9px;
    background: var(--text-dark);
    border-radius: 50%;
  }

  .bear .mouth{
    position:absolute;
    top: 4px; left:50%;
    transform: translateX(-50%);
    width: 14px; height:7px;
    border-bottom: 2px solid var(--text-dark);
    border-radius: 0 0 10px 10px;
  }

  .bear .eye{
    position:absolute;
    top: 34px;
    width: 7px; height: 9px;
    background: var(--text-dark);
    border-radius: 50%;
  }
  .bear .eye.l{ left: 24px; }
  .bear .eye.r{ right: 24px; }

  .bear .cheek{
    position:absolute;
    top: 44px;
    width: 14px; height:9px;
    background: rgba(255,141,171,.55);
    border-radius:50%;
  }
  .bear .cheek.l{ left: 12px; }
  .bear .cheek.r{ right: 12px; }

  .bear .heart-chest{
    position:absolute;
    bottom: 20px; left:50%;
    transform: translateX(-50%);
    font-size: 13px;
    opacity:.9;
  }

  /* ---------- frases flotantes ---------- */

  .phrase{
    position:absolute;
    background: #fff;
    color: var(--text-dark);
    font-family:'Baloo 2', sans-serif;
    font-size: 12.5px;
    padding: 7px 13px;
    border-radius: 999px;
    box-shadow: 0 8px 16px rgba(0,0,0,.18);
    white-space: nowrap;
    opacity:0;
    transform: translateY(10px) scale(.7);
    z-index: 6;
    transition: transform .55s cubic-bezier(.2,.9,.25,1), opacity .5s ease;
  }

  #scene.opened .phrase{
    opacity:1;
    transform: translateY(0) scale(1);
  }

  .p1{ top: 6px; left: -4px; }
  .p2{ top: 0px; right: -10px; }
  .p3{ top: 58px; left: -34px; }
  .p4{ top: 60px; right: -30px; }
  .p5{ top: 116px; left: 8px; }

  #scene.opened .p1{ transition-delay: .95s; }
  #scene.opened .p2{ transition-delay: 1.15s; }
  #scene.opened .p3{ transition-delay: 1.35s; }
  #scene.opened .p4{ transition-delay: 1.55s; }
  #scene.opened .p5{ transition-delay: 1.75s; }

  /* ---------- pregunta ---------- */

  #question{
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition: opacity .6s ease, max-height .6s ease;
    transition-delay: 2.1s;
    position:relative;
  }

  #scene.opened ~ #question{
    max-height: 300px;
    opacity:1;
  }

  #question h2{
    font-family:'Baloo 2', sans-serif;
    color: var(--text-dark);
    font-size: clamp(1.3rem, 5.4vw, 1.6rem);
    margin: 8px 0 22px;
  }

  #stage{
    position:relative;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top: 4px;
    min-height: 160px;
  }

  .btn{
    font-family:'Baloo 2', sans-serif;
    font-weight: 500;
    font-size: 15px;
    padding: 14px 30px;
    border-radius: 999px;
    border: none;
    cursor:pointer;
    transition: transform .18s ease;
  }

  #yes{
    background: linear-gradient(135deg, var(--box-red), var(--gold));
    color: #4a0a1c;
    box-shadow: 0 10px 24px rgba(224,23,110,.4);
    position:relative;
    z-index:3;
    animation: pulse 2.2s ease-in-out infinite;
  }
  #yes:hover{ transform: scale(1.07); }

  @keyframes pulse{
    0%,100%{ box-shadow: 0 10px 24px rgba(224,23,110,.4); }
    50%{ box-shadow: 0 10px 34px rgba(255,207,107,.6); }
  }

  #no{
    background: rgba(122,16,48,.06);
    color: rgba(122,16,48,.7);
    border: 1px solid rgba(122,16,48,.25);
    position:absolute;
    top: 4px;
    left: calc(50% + 96px);
    z-index:4;
    transition: top .28s ease, left .28s ease, opacity .5s ease, transform .5s ease;
  }

  #no.gone{
    opacity: 0;
    transform: scale(.4) rotate(20deg);
    pointer-events: none;
  }

  /* ---------- reveal final ---------- */

  #reveal{
    display:none;
    flex-direction: column;
    align-items:center;
    padding-top: 6px;
  }

  #reveal h2{
    font-family:'Baloo 2', sans-serif;
    color: var(--text-dark);
    font-size: clamp(1.3rem, 5.2vw, 1.7rem);
    margin: 4px 0 8px;
  }

  #reveal p{
    color: rgba(122,16,48,.65);
    font-size: 13.5px;
    max-width: 300px;
  }

  .wa-btn{
    display:inline-block;
    margin-top: 22px;
    background: linear-gradient(135deg, #25D366, #1fb659);
    color: #fff;
    text-decoration:none;
    box-shadow: 0 10px 24px rgba(37,211,102,.4);
  }
  .wa-btn:hover{ transform: scale(1.05); }

  .wa-status{
    margin-top: 18px !important;
    font-size: 12.5px !important;
    color: rgba(122,16,48,.5) !important;
  }

  .confetti{
    position:fixed;
    top:-10px;
    width: 8px; height:14px;
    opacity:.9;
    animation: fall linear forwards;
    z-index:9;
  }
  @keyframes fall{
    to{ transform: translateY(115vh) rotate(720deg); opacity:0; }
  }
  /* ---------- responsive ---------- */

  .card{
    width: min(420px, 94vw);
  }

  @media (max-width: 400px){
    .card{ padding: 30px 16px 30px; }
    #scene{
      transform: scale(.85);
      transform-origin: 50% 100%;
      height: 200px;
      margin-bottom: -14px;
    }
    #no{ left: calc(50% + 70px); }
  }

  @media (max-width: 340px){
    .card{ padding: 26px 12px 26px; }
    #scene{
      transform: scale(.72);
      height: 180px;
      margin-bottom: -30px;
    }
    #no{ top: 46px; left: calc(50% - 44px); }
  }

  @media (min-width: 900px){
    .card{ width: 440px; padding: 44px 34px 40px; }
  }

  @media (max-height: 680px) and (orientation: landscape){
    main{ padding: 18px 16px; align-items: flex-start; }
    #scene{ transform: scale(.75); height: 170px; margin-bottom: -30px; }
    .card{ padding: 22px 20px 22px; }
  }
</style>
</head>
<body>

<div id="hearts-bg"></div>

<main>
  <div class="card">
    <div class="eyebrow">Para ti</div>
    <h1 class="title" id="top-title">Te amo</h1>
    <p class="hint" id="top-hint">Toca la cajita para abrirla 🎁</p>

    <div id="scene">
      <div class="burst"></div>
      <div class="gift-wrap" id="giftWrap">
        <div class="bow-knot"></div>
        <div class="bow"></div>
        <div class="lid"></div>
        <div class="box-body"></div>
        <div class="tap-hint">toca aquí ✦</div>

        <div class="bear" id="bear">
          <div class="ear l"></div>
          <div class="ear r"></div>
          <div class="head">
            <div class="eye l"></div>
            <div class="eye r"></div>
            <div class="cheek l"></div>
            <div class="cheek r"></div>
            <div class="snout">
              <div class="nose"></div>
              <div class="mouth"></div>
            </div>
          </div>
          <div class="heart-chest">💗</div>
        </div>

        <div class="phrase p1">Te amo 💗</div>
        <div class="phrase p2">Eres mi todo 💕</div>
        <div class="phrase p3">Me encantas ✨</div>
        <div class="phrase p4">Gracias por existir 🌹</div>
        <div class="phrase p5">Siempre pienso en ti 🧸</div>
      </div>
    </div>

    <div id="question">
      <h2>¿Quieres ser mi novia?</h2>
      <div id="stage">
        <button id="yes" class="btn">Sí, quiero</button>
        <button id="no" class="btn">No</button>
      </div>
    </div>

    <div id="reveal">
      <h2>Sabía que dirías que sí 🤍</h2>
      <p>Mira tu WhatsApp 💕 🎁</p>
      <p id="waStatus" class="wa-status">Enviando un mensajito... 💌</p>
      <a id="waHer" class="btn wa-btn" href="#" target="_blank" rel="noopener" style="display:none;">Reintentar envío 💌</a>
    </div>
  </div>
</main>

<script>
  // Corazones de fondo flotando
  const heartsBg = document.getElementById('hearts-bg');
  for(let i=0;i<22;i++){
    const h = document.createElement('div');
    h.className = 'bg-heart';
    h.innerHTML = '❤';
    h.style.left = Math.random()*100+'%';
    h.style.fontSize = (16 + Math.random()*30)+'px';
    h.style.bottom = (Math.random()*100)+'%';
    h.style.animationDuration = (10 + Math.random()*12)+'s';
    h.style.animationDelay = (Math.random()*8)+'s';
    heartsBg.appendChild(h);
  }

  // Abrir la caja
  const scene = document.getElementById('scene');
  const giftWrap = document.getElementById('giftWrap');
  giftWrap.addEventListener('click', ()=>{
    if(scene.classList.contains('opened')) return;
    scene.classList.add('opened');
    document.getElementById('top-hint').style.opacity = '0';
    setTimeout(placeNoSafely, 2200);
  });

  // Boton "No" esquivo
  const noBtn = document.getElementById('no');
  const yesBtn = document.getElementById('yes');
  const stageEl = document.getElementById('stage');
  let dodges = 0;
  let gone = false;
  const dodgeTexts = ["No","¿Segura?","Lo dudo","Casi...","Ni cerca","Nos fuimos"];
  const MAX_DODGES = 6;

  function overlapsYes(x, y, w, h, stageRect, yesRect){
    const pad = 14;
    const yesLeft = yesRect.left - stageRect.left - pad;
    const yesRight = yesRect.right - stageRect.left + pad;
    const yesTop = yesRect.top - stageRect.top - pad;
    const yesBottom = yesRect.bottom - stageRect.top + pad;
    return !(x + w < yesLeft || x > yesRight || y + h < yesTop || y > yesBottom);
  }

  function placeNoSafely(){
    const stageRect = stageEl.getBoundingClientRect();
    const yesRect = yesBtn.getBoundingClientRect();
    const btnW = noBtn.offsetWidth || 90;
    const btnH = noBtn.offsetHeight || 44;
    const pad = 6;
    const maxLeft = Math.max(stageRect.width - btnW - pad, pad);
    const maxTop = Math.max(stageRect.height - btnH - pad, pad);

    let x, y, tries = 0;
    do{
      x = pad + Math.random() * (maxLeft - pad);
      y = pad + Math.random() * (maxTop - pad);
      tries++;
    } while(tries < 10 && overlapsYes(x, y, btnW, btnH, stageRect, yesRect));

    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
  }

  function dodge(){
    if(gone) return;
    placeNoSafely();
    dodges++;
    noBtn.textContent = dodgeTexts[Math.min(dodges, dodgeTexts.length-1)];

    if(dodges >= MAX_DODGES){
      gone = true;
      setTimeout(()=>{ noBtn.classList.add('gone'); }, 550);
    }
  }

  noBtn.addEventListener('mouseenter', dodge);
  noBtn.addEventListener('click', (e)=>{ e.preventDefault(); dodge(); });
  noBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); dodge(); }, {passive:false});

  // Boton "Si"
  document.getElementById('yes').addEventListener('click', ()=>{
    document.getElementById('question').style.display = 'none';
    document.getElementById('scene').style.display = 'none';
    document.getElementById('top-title').style.display = 'none';
    document.getElementById('top-hint').style.display = 'none';
    document.getElementById('reveal').style.display = 'flex';

    const colors = ['#ff8fab','#ffcf6b','#e0176e','#ffffff','#c98a55'];
    for(let i=0;i<120;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100+'vw';
      c.style.background = colors[Math.floor(Math.random()*colors.length)];
      c.style.animationDuration = (2.4 + Math.random()*2.6)+'s';
      c.style.animationDelay = (Math.random()*0.9)+'s';
      c.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(), 6500);
    }

    // Envío automático por WhatsApp usando la API de UltraMsg
    const ULTRAMSG_INSTANCE = 'instance184918';
    const ULTRAMSG_TOKEN = 'w5jkyz3uav1q0nu1';

    function sendWhatsApp(number, text){
      const url = `https://api.ultramsg.com/${ULTRAMSG_INSTANCE}/messages/chat`
        + `?token=${encodeURIComponent(ULTRAMSG_TOKEN)}`
        + `&to=${encodeURIComponent(number)}`
        + `&body=${encodeURIComponent(text)}`
        + `&priority=10`;
      return fetch(url).then(r => r.json());
    }

  
    const myNumber = '+51968237345';
    const herNumber = '+5214445338629';
    const noticeMsg = '¡Dije que sí! 🤍 Ya somos novios.';
    const loveMsg = 'Dijiste que sí 🤍 y desde ahora prometo cuidarte, hacerte reír todos los días y estar a tu lado en cada momento, bonito y no tan bonito. Gracias por elegirme y por confiar en mí. Te amo 💕✨';

    const waStatus = document.getElementById('waStatus');
    const waRetry = document.getElementById('waHer');
    waRetry.href = `https://wa.me/${myNumber.replace('+','')}?text=${encodeURIComponent(noticeMsg)}`;

    Promise.all([
      sendWhatsApp(myNumber, noticeMsg),
      sendWhatsApp(herNumber, loveMsg)
    ])
      .then(()=>{
        waStatus.textContent = 'Mensaje enviado ✓';
      })
      .catch(()=>{
        waStatus.textContent = 'No se pudo enviar automáticamente 😕';
        waRetry.style.display = 'inline-block';
      });
  });
</script>

</body>
</html>
